apiVersion: v1
kind: Service
metadata:
  name: kubedb-dbaas-api
  namespace: kubedb-dbaas
  labels:
    app: kubedb-dbaas-api
  # Removed annotation-based Prometheus discovery - now using ServiceMonitor
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: kubedb-dbaas-api
---
apiVersion: v1
kind: Service
metadata:
  name: kubedb-dbaas-api-lb
  namespace: kubedb-dbaas
  labels:
    app: kubedb-dbaas-api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: kubedb-dbaas-api
